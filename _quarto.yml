project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "sections/*.qmd"

website:
  title: "Comment on the OMB Rule"
  description: >-
    A researcher's guide to the proposed OMB "Regulation for Federal Financial
    Assistance" — what it changes, why it threatens science, and how to file a
    public comment before the deadline.
  # Generates llms.txt + per-page .llms.md (requires Quarto >= 1.7)
  llms-txt: true
  site-url: "https://example.org"
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: primary
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "How to Comment"
        href: how-to-comment.qmd
      - text: "Draft with AI"
        href: draft-with-ai.qmd
      - text: "The Rule"
        href: sections/index.qmd
      - text: "FAQ"
        href: faq.qmd
      - text: "Resources"
        href: resources.qmd
    right:
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/
        aria-label: GitHub
  page-footer:
    border: true
    left: >-
      An independent, volunteer-built guide. Not affiliated with any federal agency.
    center: >-
      Comment deadline: **July 13, 2026** · Docket **OMB-2026-0034**
    right: >-
      Built with [Quarto](https://quarto.org). Source on [GitHub](https://github.com/).

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    toc-depth: 3
    css: styles.css
    include-in-header:
      - text: |
          <meta name="robots" content="index, follow">
    grid:
      body-width: 900px
    link-external-newwindow: true
    link-external-icon: true
