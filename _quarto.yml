project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
  # Copy the GitHub Pages custom-domain file into _site on every build so it
  # survives the gh-pages republish.
  resources:
    - CNAME

website:
  title: "Comment on the OMB Rule"
  description: >-
    A researcher's guide to the proposed OMB "Regulation for Federal Financial
    Assistance" — what it changes, why it threatens science, and how to file a
    public comment before the deadline.
  # Generates llms.txt + per-page .llms.md (requires Quarto >= 1.7)
  llms-txt: true
  # Keep in sync with site.url in _variables.yml (this config cannot read that file).
  site-url: "https://defendfederalresearch.org"
  repo-url: "https://github.com/jhelvy/omb-response-guide"
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: primary
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "The Rule"
        href: the-rule.qmd
      - text: "Claims vs. Reality"
        href: claims-vs-reality.qmd
      - text: "How to Comment"
        href: how-to-comment.qmd
      - text: "Draft with AI"
        href: draft-with-ai.qmd
      - text: "Contact Congress"
        href: contact-congress.qmd
      - text: "FAQ"
        href: faq.qmd
      - text: "Resources"
        href: resources.qmd
    right:
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/jhelvy/omb-response-guide
        aria-label: GitHub
  page-footer:
    border: true
    left: >-
      An independent, volunteer-built guide. Not affiliated with any federal agency.
    center: >-
      Comment deadline: **July 13, 2026** · Docket **OMB-2026-0034**
    right: >-
      Built with [Quarto](https://quarto.org). Source on [GitHub](https://github.com/jhelvy/omb-response-guide).

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    toc-depth: 3
    include-in-header:
      - text: |
          <meta name="robots" content="index, follow">
    grid:
      body-width: 900px
    link-external-newwindow: false
    link-external-icon: true
